site_name: Dalli Wiki
site_description: Техническая документация
site_author: V1oxy

theme:
  name: material
  language: ru

  features:
    - navigation.tabs
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Главная: index.md

  - Технические задания: projects.md

  - Шаблоны документов: https://disk.yandex.ru/d/TtDkEZ-PvsO7Og
  
extra_css:
  - stylesheets/extra.css